<body> 
    <header class="w-[100%] h-[40vh]">
        <div class="float-start text-center ml-3">

    <script>
        const mensagem = document.getElementById("messageInput");

        function enviarMensagem(){
            if(mensagem.value == ""){
                alert("Sem mensagem para ser enviada")
                return;
            }else{
                const contato = "558181564667"
                window.open(`https://wa.me/${contato}?text=${mensagem.value}`)
                mensagem.value = "";
            }  
        }
       

    </script>
